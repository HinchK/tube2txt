version: '3.8'

services:
  hub:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./projects:/app/projects
      - ./tube2txt.db:/app/tube2txt.db
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    command: tube2txt-hub

  tube2txt:
    build: .
    volumes:
      - ./projects:/app/projects
      - ./tube2txt.db:/app/tube2txt.db
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    # Usage: docker-compose run tube2txt tube2txt <slug> <url> --ai
    entrypoint: tube2txt
