version: '3.8'

services:
  hub:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    command: python3 hub.py

  tube2txt:
    build: .
    volumes:
      - .:/app
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    # Usage: docker-compose run tube2txt <slug> <url> --ai
    entrypoint: /app/tube2txt.sh
